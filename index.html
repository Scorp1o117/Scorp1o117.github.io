<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>异界轮回 · 系统觉醒</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg0: #0d0d1a;
    --bg1: #13132a;
    --bg2: #1a1a38;
    --border: #2a2a5a;
    --gold: #f0c060;
    --gold2: #d4a030;
    --red: #e05060;
    --blue: #5090e0;
    --green: #50c878;
    --purple: #9060d0;
    --text: #d0c8e8;
    --text2: #8880a8;
    --panel-bg: rgba(20,20,50,0.92);
  }

  body {
    font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
    background: var(--bg0);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .bg-stars {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(80,60,140,0.15) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(60,80,160,0.1) 0%, transparent 60%),
      var(--bg0);
    z-index: 0;
  }

  .bg-stars::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.6), transparent),
      radial-gradient(1px 1px at 30% 45%, rgba(255,255,255,0.4), transparent),
      radial-gradient(1.5px 1.5px at 55% 10%, rgba(255,255,255,0.7), transparent),
      radial-gradient(1px 1px at 75% 30%, rgba(255,255,255,0.5), transparent),
      radial-gradient(1px 1px at 90% 60%, rgba(255,255,255,0.4), transparent),
      radial-gradient(1.5px 1.5px at 20% 80%, rgba(255,255,255,0.6), transparent),
      radial-gradient(1px 1px at 60% 70%, rgba(255,255,255,0.3), transparent),
      radial-gradient(1px 1px at 85% 90%, rgba(255,255,255,0.5), transparent),
      radial-gradient(1px 1px at 45% 55%, rgba(255,255,255,0.4), transparent),
      radial-gradient(1.5px 1.5px at 5% 50%, rgba(255,255,255,0.6), transparent);
    animation: twinkle 8s ease-in-out infinite alternate;
  }

  @keyframes twinkle {
    0% { opacity: 0.5; }
    100% { opacity: 1; }
  }

  /* ===== 布局 ===== */
  #app {
    position: relative;
    z-index: 2;
    max-width: 1100px;
    margin: 0 auto;
    padding: 16px;
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1fr 300px;
    gap: 16px;
  }

  /* ===== 顶部 ===== */
  .top-bar {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    background: var(--panel-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    backdrop-filter: blur(8px);
  }

  .top-bar-title {
    font-size: 15px;
    font-weight: bold;
    color: var(--gold);
    letter-spacing: 2px;
    text-shadow: 0 0 10px rgba(240,192,96,0.5);
    margin-right: auto;
  }

  .top-bar-title span {
    font-size: 10px;
    color: var(--text2);
    display: block;
    letter-spacing: 1px;
    font-weight: normal;
    text-shadow: none;
  }

  .stat-chip {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 12px;
  }

  .stat-chip.hp { border-color: var(--red); color: #ff8090; }
  .stat-chip.mp { border-color: var(--blue); color: #80b0ff; }
  .stat-chip.gold-icon { border-color: var(--gold); color: var(--gold); }

  .stat-bar { width: 60px; height: 5px; background: var(--bg1); border-radius: 3px; overflow: hidden; }
  .stat-bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
  .stat-bar-fill.hp { background: linear-gradient(90deg, #e05060, #ff8090); }
  .stat-bar-fill.mp { background: linear-gradient(90deg, #3060c0, #5090e0); }

  /* ===== 左侧剧情 ===== */
  .story-panel {
    background: var(--panel-bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    display: flex;
    flex-direction: column;
    backdrop-filter: blur(8px);
    overflow: hidden;
    max-height: calc(100vh - 130px);
  }

  .chapter-header {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    color: var(--text2);
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .chapter-badge {
    background: linear-gradient(135deg, var(--purple), #6040b0);
    color: white;
    padding: 2px 10px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: bold;
  }

  .story-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }

  .story-scroll::-webkit-scrollbar { width: 4px; }
  .story-scroll::-webkit-scrollbar-track { background: transparent; }
  .story-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .story-block {
    opacity: 0;
    transform: translateY(12px);
    animation: fadeInUp 0.4s ease forwards;
  }

  @keyframes fadeInUp {
    to { opacity: 1; transform: translateY(0); }
  }

  .story-text {
    font-size: 14px;
    line-height: 1.9;
    color: var(--text);
    padding: 14px 18px;
    background: rgba(30,30,70,0.6);
    border-left: 3px solid var(--purple);
    border-radius: 0 10px 10px 0;
  }

  .story-text.system {
    border-left-color: var(--gold);
    background: rgba(50,40,10,0.5);
    color: var(--gold);
    font-family: 'Courier New', monospace;
    font-size: 13px;
  }

  .story-text.dialogue {
    border-left-color: var(--blue);
    background: rgba(20,30,60,0.5);
    padding: 12px 18px;
  }

  .speaker {
    font-weight: bold;
    font-size: 12px;
    margin-bottom: 6px;
    letter-spacing: 1px;
  }

  .speaker.npc { color: #80b0e0; }
  .speaker.system-voice { color: var(--gold); }
  .speaker.yuki { color: #80c0e0; }
  .speaker.lily { color: #e090c0; }
  .speaker.rosa { color: #e08060; }
  .speaker.sylphy { color: #70c070; }

  .scene-desc {
    font-size: 13px;
    color: var(--text2);
    font-style: italic;
    padding: 10px 16px;
    background: rgba(255,255,255,0.03);
    border-radius: 8px;
    border: 1px dashed var(--border);
    line-height: 1.8;
  }

  /* ===== 选项 ===== */
  .choices-container {
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 8px 0;
  }

  /* 内联导航按钮（text 数组里的 type:next 项） */
  .inline-next-container {
    display: flex;
    justify-content: center;
    padding: 10px 0;
    animation: fadeInUp 0.4s ease;
  }

  .inline-next-btn {
    min-width: 200px;
  }

  .choice-btn {
    padding: 14px 20px;
    background: linear-gradient(135deg, rgba(40,40,90,0.8), rgba(30,30,70,0.8));
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 14px;
    cursor: pointer;
    text-align: left;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
    font-family: inherit;
    line-height: 1.6;
    width: 100%;
  }

  .choice-btn::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--purple);
    transform: scaleY(0);
    transition: transform 0.3s;
  }

  .choice-btn:hover {
    border-color: var(--purple);
    background: linear-gradient(135deg, rgba(80,60,160,0.4), rgba(50,40,100,0.4));
    transform: translateX(6px);
    box-shadow: 0 0 20px rgba(144,96,208,0.2);
  }

  .choice-btn:hover::before { transform: scaleY(1); }
  .choice-btn:active { transform: translateX(6px) scale(0.99); }

  .choice-btn.romantic { border-color: rgba(224,100,160,0.3); }
  .choice-btn.romantic::before { background: #e064a0; }
  .choice-btn.romantic:hover { border-color: #e064a0; background: linear-gradient(135deg, rgba(160,60,120,0.4), rgba(100,40,80,0.4)); box-shadow: 0 0 20px rgba(224,100,160,0.2); }

  .choice-btn.battle { border-color: rgba(224,80,60,0.3); }
  .choice-btn.battle::before { background: #e0503c; }
  .choice-btn.battle:hover { border-color: #e0503c; background: linear-gradient(135deg, rgba(160,50,40,0.4), rgba(100,30,20,0.4)); box-shadow: 0 0 20px rgba(224,80,60,0.2); }

  .choice-btn.clever { border-color: rgba(80,200,120,0.3); }
  .choice-btn.clever::before { background: #50c878; }
  .choice-btn.clever:hover { border-color: #50c878; background: linear-gradient(135deg, rgba(40,140,80,0.4), rgba(20,100,60,0.4)); box-shadow: 0 0 20px rgba(80,200,120,0.2); }

  .choice-btn.selected {
    border-color: var(--gold) !important;
    background: rgba(100,80,160,0.5) !important;
    pointer-events: none;
  }

  .choice-tag {
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 6px;
    margin-right: 6px;
    vertical-align: middle;
    display: inline-block;
    margin-bottom: 4px;
  }

  .tag-romantic { background: rgba(224,100,160,0.2); color: #e090c0; }
  .tag-battle { background: rgba(224,80,60,0.2); color: #e08070; }
  .tag-clever { background: rgba(80,200,120,0.2); color: #80e0a0; }
  .tag-normal { background: rgba(100,100,180,0.2); color: #a0a0d0; }

  .choice-effect {
    font-size: 11px;
    color: var(--text2);
    margin-top: 4px;
    padding-left: 28px;
  }

  /* ===== 右侧面板 ===== */
  .system-panel {
    display: flex;
    flex-direction: column;
    gap: 12px;
    max-height: calc(100vh - 130px);
    overflow-y: auto;
  }

  .system-panel::-webkit-scrollbar { width: 3px; }
  .system-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .panel-card {
    background: var(--panel-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    backdrop-filter: blur(8px);
  }

  .panel-title {
    font-size: 11px;
    font-weight: bold;
    color: var(--gold);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid rgba(240,192,96,0.2);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* 属性 */
  .attr-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }

  .attr-item {
    padding: 7px 8px;
    background: var(--bg1);
    border-radius: 8px;
    border: 1px solid var(--border);
    text-align: center;
  }

  .attr-name { font-size: 10px; color: var(--text2); margin-bottom: 3px; }
  .attr-val { font-size: 15px; font-weight: bold; }

  /* 任务 */
  .quest-item {
    padding: 9px 12px;
    background: var(--bg1);
    border-radius: 8px;
    border-left: 3px solid var(--blue);
    margin-bottom: 7px;
    font-size: 12px;
  }

  .quest-item.main { border-left-color: var(--gold); }
  .quest-item.side { border-left-color: var(--green); }
  .quest-title { font-weight: bold; color: var(--text); margin-bottom: 3px; }
  .quest-desc { color: var(--text2); font-size: 11px; line-height: 1.4; }
  .quest-reward { margin-top: 4px; font-size: 10px; color: var(--gold2); }

  /* 技能 */
  .skill-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 8px;
    background: var(--bg1);
    border-radius: 8px;
    margin-bottom: 5px;
    border: 1px solid var(--border);
    font-size: 12px;
  }

  .skill-icon {
    width: 26px; height: 26px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
  }

  .skill-info { flex: 1; }
  .skill-name { font-weight: bold; color: var(--text); font-size: 11px; }
  .skill-desc { font-size: 10px; color: var(--text2); }
  .skill-lv { font-size: 10px; font-weight: bold; color: var(--gold); padding: 2px 5px; background: rgba(240,192,96,0.1); border-radius: 5px; }

  /* 道具 */
  .item-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 5px;
  }

  .item-slot {
    padding: 7px 5px;
    background: var(--bg1);
    border: 1px solid var(--border);
    border-radius: 8px;
    text-align: center;
    font-size: 11px;
  }

  .item-slot.empty { opacity: 0.3; border-style: dashed; }
  .item-emoji { font-size: 16px; margin-bottom: 2px; }
  .item-name { color: var(--text); font-weight: bold; font-size: 10px; }
  .item-count { color: var(--gold); font-size: 10px; }

  /* 好感度 */
  .favor-list { display: flex; flex-direction: column; gap: 8px; }

  .favor-item { display: flex; align-items: center; gap: 7px; }

  .favor-avatar {
    width: 30px; height: 30px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
    border: 2px solid var(--border);
  }

  .favor-info { flex: 1; }
  .favor-name { font-size: 11px; font-weight: bold; color: var(--text); }
  .favor-bar-bg { height: 4px; background: var(--bg1); border-radius: 2px; margin-top: 3px; overflow: hidden; }
  .favor-bar { height: 100%; border-radius: 2px; transition: width 0.6s ease; }
  .favor-val { font-size: 11px; font-weight: bold; color: var(--text2); width: 26px; text-align: right; flex-shrink: 0; }

  /* 后宫指示器 */
  .harem-bar {
    padding: 8px 12px;
    background: rgba(200,50,150,0.1);
    border: 1px solid rgba(200,100,180,0.3);
    border-radius: 8px;
    margin-top: 10px;
    font-size: 11px;
    color: #e090c0;
  }

  .harem-bar-title { font-weight: bold; margin-bottom: 5px; color: #e090c0; }
  .harem-dots { display: flex; gap: 4px; flex-wrap: wrap; }
  .harem-dot {
    width: 24px; height: 24px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    border: 2px solid var(--border);
    transition: all 0.3s;
  }
  .harem-dot.active { border-color: #e090c0; box-shadow: 0 0 8px rgba(224,144,192,0.5); }

  /* 重大分歧选项 */
  .choice-btn.critical {
    border-color: rgba(240,192,96,0.5);
    background: linear-gradient(135deg, rgba(60,50,10,0.7), rgba(40,35,10,0.7));
  }
  .choice-btn.critical::before { background: var(--gold); }
  .choice-btn.critical:hover {
    border-color: var(--gold);
    background: linear-gradient(135deg, rgba(100,80,10,0.5), rgba(70,55,10,0.5));
    box-shadow: 0 0 24px rgba(240,192,96,0.3);
  }

  .critical-warning {
    background: linear-gradient(135deg, rgba(60,50,10,0.8), rgba(40,35,10,0.8));
    border: 1px solid rgba(240,192,96,0.4);
    border-radius: 10px;
    padding: 10px 14px;
    margin-bottom: 6px;
    font-size: 12px;
    color: var(--gold);
    display: flex;
    align-items: center;
    gap: 8px;
    animation: fadeInUp 0.4s ease;
  }

  .critical-warning-icon { font-size: 16px; flex-shrink: 0; }
  .critical-warning-text { line-height: 1.5; }

  /* 选项已选中（置灰淡出） */
  .choice-btn.done-hidden {
    opacity: 0.25;
    pointer-events: none;
    transform: none !important;
  }

  /* 底部控制 */
  .bottom-bar {
    grid-column: 1 / -1;
    display: flex;
    justify-content: center;
    gap: 10px;
    padding: 8px;
  }

  .ctrl-btn {
    padding: 7px 18px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text2);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.3s;
    font-family: inherit;
  }

  .ctrl-btn:hover { border-color: var(--gold); color: var(--gold); }

  /* 通知 */
  .notification {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-100px);
    background: var(--panel-bg);
    border: 1px solid var(--gold);
    border-radius: 10px;
    padding: 10px 22px;
    color: var(--gold);
    font-size: 13px;
    z-index: 1000;
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    backdrop-filter: blur(10px);
    box-shadow: 0 0 30px rgba(240,192,96,0.2);
    pointer-events: none;
  }

  .notification.show { transform: translateX(-50%) translateY(0); }

  /* 飘字 */
  .float-text {
    position: fixed;
    pointer-events: none;
    font-size: 13px;
    font-weight: bold;
    z-index: 200;
    animation: floatText 1.5s ease-out forwards;
  }

  @keyframes floatText {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-50px) scale(0.8); }
  }

  .float-text.attr-up { color: #50c878; }
  .float-text.gold-up { color: var(--gold); }
  .float-text.love-up { color: #e090c0; }
  .float-text.level-up { color: var(--purple); }

  /* 粒子 */
  .particle {
    position: fixed;
    width: 3px; height: 3px;
    border-radius: 50%;
    pointer-events: none;
    animation: float-up 2s ease-out forwards;
    z-index: 1;
  }

  @keyframes float-up {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-100px) scale(0); }
  }

  /* 开始界面 */
  #start-screen {
    position: fixed;
    inset: 0;
    background: var(--bg0);
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
    text-align: center;
  }

  #start-screen.hidden { display: none; }

  .start-title {
    font-size: 44px;
    font-weight: bold;
    background: linear-gradient(135deg, #f0c060, #e080c0, #7090e0);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 8px;
    animation: titleGlow 3s ease-in-out infinite alternate;
  }

  @keyframes titleGlow {
    0% { filter: drop-shadow(0 0 12px rgba(240,192,96,0.6)); }
    100% { filter: drop-shadow(0 0 30px rgba(200,120,220,0.8)); }
  }

  .start-sub { color: var(--text2); font-size: 13px; letter-spacing: 4px; }

  .start-btn {
    padding: 15px 50px;
    background: linear-gradient(135deg, rgba(100,60,180,0.6), rgba(60,40,120,0.6));
    border: 1px solid var(--purple);
    border-radius: 30px;
    color: white;
    font-size: 15px;
    cursor: pointer;
    font-weight: bold;
    letter-spacing: 4px;
    transition: all 0.3s;
    font-family: inherit;
    box-shadow: 0 0 25px rgba(144,96,208,0.3);
  }

  .start-btn:hover {
    background: linear-gradient(135deg, rgba(140,80,220,0.7), rgba(80,50,160,0.7));
    box-shadow: 0 0 45px rgba(144,96,208,0.5);
    transform: scale(1.05);
  }

  .start-tips { color: var(--text2); font-size: 11px; max-width: 420px; line-height: 1.9; }

  /* 结局 */
  .ending-screen { text-align: center; padding: 20px; }
  .ending-title { font-size: 26px; font-weight: bold; color: var(--gold); margin: 10px 0; }
  .ending-sub { color: var(--text2); font-size: 12px; line-height: 1.9; margin: 16px 0; white-space: pre-line; }
  .ending-stats { display: flex; justify-content: center; gap: 16px; flex-wrap: wrap; margin: 16px 0; }
  .ending-stat { padding: 10px 18px; background: var(--bg1); border: 1px solid var(--border); border-radius: 10px; }
  .ending-stat-val { font-size: 20px; font-weight: bold; color: var(--gold); }
  .ending-stat-label { font-size: 10px; color: var(--text2); margin-top: 2px; }

  /* harem提示 */
  .harem-event-banner {
    text-align: center;
    padding: 12px;
    background: linear-gradient(135deg, rgba(180,60,140,0.2), rgba(100,40,120,0.2));
    border: 1px solid rgba(200,100,180,0.4);
    border-radius: 10px;
    margin: 8px 0;
    font-size: 12px;
    color: #e090c0;
    animation: fadeInUp 0.5s ease;
  }

  /* ── 命名输入框 ──────────────────── */
  .start-name-box {
    display: flex; flex-direction: column; align-items: center; gap: 8px;
  }
  .start-name-label { font-size: 13px; color: var(--text2); letter-spacing: 2px; }
  .start-name-input {
    padding: 10px 20px;
    background: rgba(30,30,70,0.8);
    border: 1px solid var(--purple);
    border-radius: 20px;
    color: var(--text);
    font-size: 16px;
    font-family: inherit;
    text-align: center;
    outline: none;
    width: 220px;
    transition: border-color 0.3s, box-shadow 0.3s;

  .start-name-input:focus {

  .start-name-default { font-size: 11px; color: var(--text2); opacity: 0.7; }

  /* ── 右侧主角名 ──────────────────── */
  .player-name-card { padding: 8px 12px !important; }

  .player-name-label { font-size: 10px; color: var(--text2); }
  #player-name-display {
    font-size: 14px; font-weight: bold;
    background: linear-gradient(135deg, var(--gold), #e080c0);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* ── 点击继续提示 ──────────────────── */
  .text-next-hint {
    text-align: center;
    color: var(--text2);
    font-size: 11px;
    padding: 6px 0 2px;
    opacity: 0;
    transition: opacity 0.4s;
    letter-spacing: 2px;
    animation: hintBlink 1.2s ease-in-out infinite alternate;
    pointer-events: none;
  }
  @keyframes hintBlink {
    0% { opacity: 0.4; }
    100% { opacity: 0.9; }

  /* ── 逐段动画速度差异 ──────────────────── */
  .story-block { animation: fadeInUp 0.4s ease forwards; }
  .story-block.speed-fast { animation: fadeInUp 0.15s ease forwards; }
  .story-block.speed-slow { animation: fadeInUp 0.7s ease forwards; }

  /* ── 直接推进选项标记 ──────────────────── */
  .choice-btn.next-only {
    opacity: 0.6;
    border-style: dashed;
    font-size: 12px;
  }
  .choice-btn.next-only:hover { opacity: 1; }
  .tag-next-only, .choice-tag.next-only {
    background: rgba(80,80,120,0.4);
    color: var(--text2);
  }

  /* ── 主推女主角标识 ──────────────────── */
  .heroine-badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    background: rgba(255,255,255,0.06);
    border: 1px solid currentColor;
    opacity: 0.8;
    margin-left: auto;
    font-weight: bold;
  }

  /* ===== Tooltip ===== */
  [data-tooltip] {
    position: relative;
    cursor: help;
  }

  [data-tooltip]::after {
    content: attr(data-tooltip);
    position: absolute;
    bottom: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%);
    background: rgba(15, 15, 35, 0.97);
    border: 1px solid var(--gold);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 11px;
    color: var(--text);
    white-space: pre-line;
    max-width: 220px;
    z-index: 999;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    line-height: 1.5;
  }

  [data-tooltip]::before {
    content: '';
    position: absolute;
    bottom: calc(100% + 2px);
    left: 50%;
    transform: translateX(-50%);
    border: 5px solid transparent;
    border-top-color: var(--gold);
    opacity: 0;
    transition: opacity 0.2s;
    z-index: 999;
    pointer-events: none;
  }

  [data-tooltip]:hover::after,
  [data-tooltip]:hover::before {
    opacity: 1;
  }

  .tooltip-attr-name {
    font-weight: bold;
    color: var(--gold);
    margin-bottom: 3px;
    font-size: 12px;
  }
  .tooltip-attr-desc {
    color: var(--text2);
    line-height: 1.4;
  }
  .tooltip-skill-name {
    font-weight: bold;
    color: #b090e0;
    margin-bottom: 3px;
    font-size: 12px;
  }
  .tooltip-skill-effect {
    color: #80d080;
    margin-bottom: 2px;
  }
  .tooltip-skill-desc {
    color: var(--text2);
    font-size: 10px;
  }
  .tooltip-favor-bar-bg {
    height: 4px;
    background: var(--bg1);
    border-radius: 2px;
    margin-top: 3px;
    overflow: hidden;
  }
  .tooltip-favor-bar {
    height: 100%;
    border-radius: 2px;
  }

  /* ── 作者署名 ──────────────────── */
  .start-author {
    font-size: 11px;
    color: var(--text2);
    letter-spacing: 2px;
    opacity: 0.55;
    margin-top: -12px;
  }

  .author-watermark {
    font-size: 10px;
    color: var(--text2);
    opacity: 0.3;
    letter-spacing: 1px;
    padding: 0 4px;
    flex-shrink: 0;
  }

  /* ── 右侧抽屉（移动端） ──────────────────── */
  /* 遮罩 */
  .drawer-mask {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: 300;
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .drawer-mask.open { opacity: 1; }

  /* 抽屉主体 */
  .drawer-panel {
    display: none;
    position: fixed;
    top: 0; right: 0; bottom: 0;
    width: 78vw;
    max-width: 320px;
    background: rgba(13,13,26,0.97);
    border-left: 1px solid var(--border);
    z-index: 301;
    overflow-y: auto;
    padding: 56px 12px 20px;
    flex-direction: column;
    gap: 10px;
    transform: translateX(100%);
    transition: transform 0.32s cubic-bezier(0.32,0.72,0,1);
    box-shadow: -8px 0 32px rgba(0,0,0,0.5);
    -webkit-overflow-scrolling: touch;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .drawer-panel.open { transform: translateX(0); }

  /* 抽屉内关闭按钮 */
  .drawer-close {
    position: absolute;
    top: 12px; right: 12px;
    width: 34px; height: 34px;
    border-radius: 50%;
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--text2);
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    line-height: 1;
  }
  .drawer-close:hover { border-color: var(--gold); color: var(--gold); }

  /* 悬浮展开按钮（仅移动端） */
  .fab-panel {
    display: none;
    position: fixed;
    right: 14px;
    bottom: 60px;
    width: 44px; height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, rgba(100,60,180,0.85), rgba(60,40,120,0.85));
    border: 1px solid var(--purple);
    color: white;
    font-size: 18px;
    cursor: pointer;
    z-index: 200;
    box-shadow: 0 4px 20px rgba(100,60,200,0.4);
    align-items: center; justify-content: center;
    transition: all 0.25s;
    backdrop-filter: blur(6px);
  }
  .fab-panel:hover { transform: scale(1.1); box-shadow: 0 6px 28px rgba(100,60,200,0.6); }
  .fab-panel:active { transform: scale(0.95); }

  /* ── 移动端全面适配 ──────────────────── */
  @media (max-width: 800px) {
    #app {
      grid-template-columns: 1fr;
      grid-template-rows: auto 1fr auto;
      padding: 8px;
      gap: 8px;
      height: 100dvh;
      min-height: unset;
      overflow: hidden;
    }

    .top-bar {
      padding: 8px 10px;
      gap: 6px;
      flex-wrap: wrap;
      border-radius: 10px;
    }

    .top-bar-title {
      font-size: 13px;
      letter-spacing: 1px;
      width: 100%;
      margin-right: 0;
      margin-bottom: 2px;
    }

    .top-bar-title span { font-size: 9px; }

    .stat-chip { padding: 3px 7px; font-size: 11px; }
    .stat-bar { width: 40px; }

    /* 剧情框撑满剩余高度 */
    .story-panel {
      max-height: none;
      flex: 1;
      min-height: 0;
      border-radius: 10px;
      overflow: hidden;
    }

    .story-scroll {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
    }

    .chapter-header { padding: 9px 14px; font-size: 11px; }
    .chapter-badge { font-size: 10px; padding: 2px 8px; }

    .scene-desc { font-size: 12px; padding: 8px 12px; }
    .choice-btn { padding: 12px 14px; font-size: 13px; }

    /* 隐藏原始系统面板，内容移入抽屉 */
    .system-panel { display: none !important; }

    /* 抽屉内面板样式 */
    .drawer-panel { display: flex; }
    .drawer-panel .panel-card {
      background: var(--panel-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 12px;
      backdrop-filter: blur(8px);
      flex-shrink: 0;
    }
    .drawer-panel .panel-title {
      font-size: 10px;
      font-weight: bold;
      color: var(--gold);

    }
    .drawer-panel .attr-grid { grid-template-columns: 1fr 1fr 1fr; gap: 5px; }
    .drawer-panel .attr-item { padding: 6px 4px; background: var(--bg1); border-radius: 7px; border: 1px solid var(--border); text-align: center; }
    .drawer-panel .attr-name { font-size: 9px; color: var(--text2); margin-bottom: 2px; }
    .drawer-panel .attr-val { font-size: 14px; font-weight: bold; }

    /* 遮罩和FAB在移动端显示 */
    .drawer-mask { display: block; pointer-events: none; }
    .drawer-mask.open { pointer-events: auto; }
    .fab-panel { display: flex; }

    .bottom-bar { padding: 6px; gap: 6px; }
    .ctrl-btn { padding: 8px 12px; font-size: 11px; }

    /* 开始界面 */
    .start-title { font-size: 32px; letter-spacing: 4px; }
    .start-sub { font-size: 11px; }
    .start-btn { padding: 13px 38px; font-size: 14px; letter-spacing: 3px; }
    .start-tips { font-size: 12px; max-width: 320px; }
    .start-name-input { width: 190px; font-size: 15px; }
  }

  /* 超窄屏 < 420px */
  @media (max-width: 420px) {
    .start-title { font-size: 26px; letter-spacing: 2px; }
    .drawer-panel { width: 88vw; }
  }
</style>
</head>

      { type: 'dialogue', speaker: '枢', char: 'system', content: '宿主，你的成长速度超出预期。\n\n看来当初选择你，是正确的决定。' },

      { type: 'dialogue', speaker: '萝莎琳德', char: 'rosa', content: '（站在高台上，声音清冷而威严）冒险者们，我有重要消息宣布——\n\n三天后，龙血试炼将在艾尔文森林深处举行。届时需要大量B级以上的冒险者参与。' },

      { type: 'system', content: '[ 萝莎琳德登场 ]\n[ 解锁：龙血试炼 ]\n[ 解锁：矿洞调查任务 ]' },

      { type: 'dialogue', speaker: '萝莎琳德', char: 'rosa', content: '（站在高台上）冒险者们，我有重要消息宣布——\n\n三天后，龙血试炼将在艾尔文森林深处举行。届时需要大量B级以上的冒险者参与。' },
      { type: 'dialogue', speaker: '萝莎琳德', char: 'rosa', content: '另外……（目光扫过人群）我们还需要一支小队，执行一项特殊任务——协助调查东边矿洞的异常现象。\n\n（转向希尔芙的方向，微微点头）……妖精族的朋友，很高兴在这里遇到你。' },

      { type: 'scene', content: '集会结束后，萝莎琳德走下高台，朝你们走来。\n\n「看来……你就是我一直在找的森林守护者。」她对希尔芙说。' },
      { type: 'dialogue', speaker: '萝莎琳德', char: 'rosa', content: '月锁徽章的事，我已经听说了。那是我的老师留下的遗物……我会协助你们找到它。' },
      { type: 'dialogue', speaker: '萝莎琳德', char: 'rosa', content: '（看向你）你就是枢选中的宿主？\n\n（微微一笑）有意思。希望你能参加龙血试炼……我很期待看到你的表现。' },

  ch3_rosa_talk: {
    chapter: 3, chapterName: '第三章', label: '龙之巫女的心声',
    heroine: 'rosa',
    text: [
      { type: 'scene', content: '集会结束后，你追上正要离开的萝莎琳德。' },
      { type: 'dialogue', speaker: '萝莎琳德', char: 'rosa', content: '……有什么事？' },
      { type: 'dialogue', speaker: '你', char: 'player', content: '萝莎琳德大人，我……只是想多了解你一些。' },
      { type: 'dialogue', speaker: '萝莎琳德', char: 'rosa', content: '（微微一愣，随即露出一个罕见的柔和表情）' },
      { type: 'dialogue', speaker: '萝莎琳德', char: 'rosa', content: '了解我？……很少有人会这么想。大多数人只看到「龙之巫女」这个身份。' },
      { type: 'dialogue', speaker: '萝莎琳德', char: 'rosa', content: '（望向夜空）你知道吗……我也曾经是个普通的冒险者。' },
      { type: 'dialogue', speaker: '萝莎琳德', char: 'rosa', content: '直到老师把月锁徽章交给我，告诉我这是龙族传承的至高神器……' },
      { type: 'dialogue', speaker: '萝莎琳德', char: 'rosa', content: '「它会选中能够驾驭它的人。」她当时是这么说的。' },
      { type: 'dialogue', speaker: '萝莎琳德', char: 'rosa', content: '（转身看向你）没想到……枢会选中一个穿越者。有意思。' },
      { type: 'dialogue', speaker: '萝莎琳德', char: 'rosa', content: '{{playerName}}……' },
      { type: 'dialogue', speaker: '萝莎琳德', char: 'rosa', content: '作为龙之巫女，我被教导要「无私地守护一切」。' },
      { type: 'dialogue', speaker: '萝莎琳德', char: 'rosa', content: '但有时候我在想……我有没有权利，为了某个人而放弃其他一切？' },
      { type: 'dialogue', speaker: '萝莎琳德', char: 'rosa', content: '（突然意识到自己说多了）……算了，这些都是无关紧要的想法。' },
      { type: 'dialogue', speaker: '萝莎琳德', char: 'rosa', content: '龙血试炼三天后开始。好好休息吧，我不会再说第二遍。' },
      { type: 'dialogue', speaker: '萝莎琳德', char: 'rosa', content: '（转身离去，但在月光下轻声说）……但加油。' },
      { type: 'system', content: '[ 萝莎琳德好感度 +15 ]\n[ 解锁：萝莎琳德的过去 ]' },
    ],
    choices: [
      { text: '（回帐篷休息，准备迎接试炼）', next: 'chapter4_start', type: 'next' },
    ]
  },

      { type: 'scene', content: '说完，萝莎琳德转身向队伍前方走去。\n\n远处传来一阵号角声——龙血试炼即将开始。\n\n雪夜、莉莉安、希尔芙——你的伙伴们都在向营地中央聚集。\n\n「{{playerName}}，我们一起去吧！」莉莉安兴奋地拉着你的手。\n\n雪夜没有说话，但她的剑已经出鞘。' },
      { type: 'system', content: '[ 萝莎琳德好感度 +10 ]\n[ 获得称号：巫女认可者 ]\n[ 解锁：龙血试炼 ]' },

      { type: 'system', content: '[ 主线任务：采集龙血结晶 ]\n[ 队伍成员：雪夜、莉莉安、希尔芙、萝莎琳德]' },

  function getStage(fav) {
    const stages = Object.entries(FAVOR_STAGES).map(([k,v]) => ({val: +k, ...v}));
    let stage = stages[0];
    for (const s of stages) { if (fav >= s.val) stage = s; }
    return stage;
  }


  function updateAttrs() {
    const html = ATTRS.map(a => `
      <div class="attr-item">
        <div class="attr-name">${a.icon} ${a.name}</div>
        <div class="attr-val" style="color:${a.color}">${S.attrs[a.key] || 5}</div>
      </div>
    `).join('');
    const g1 = document.getElementById('attr-grid');
    const g2 = document.getElementById('drawer-attr-grid');
    if (g1) g1.innerHTML = html;
    if (g2) g2.innerHTML = html;
  }

  function updateSkills() {
    let html;
    if (!S.skills || S.skills.length === 0) {
      html = '<div style="color:#666;font-size:12px;text-align:center;padding:8px;">暂无技能</div>';
    } else {
      html = S.skills.map(s => `
        <div class="skill-item">
          <div class="skill-icon" style="background:${s.color || '#5090e0'}22">${s.icon || '⚔️'}</div>
          <div class="skill-info">
            <div class="skill-name">${s.name}</div>
            <div class="skill-desc">${s.desc || ''}</div>
          </div>
          <div class="skill-lv">Lv.${s.level || 1}</div>
        </div>
      `).join('');
    }
    const l1 = document.getElementById('skill-list');
    const l2 = document.getElementById('drawer-skill-list');
    if (l1) l1.innerHTML = html;
    if (l2) l2.innerHTML = html;
  }

  function updateItems() {
    const items = Object.entries(S.items || {});
    let html;
    if (items.length === 0) {
      html = `
        <div class="item-slot empty"><div class="item-emoji">-</div><div class="item-name">空</div></div>
        <div class="item-slot empty"><div class="item-emoji">-</div><div class="item-name">空</div></div>
      `;
    } else {
      html = items.slice(0, 6).map(([name, data]) => `
        <div class="item-slot">
          <div class="item-emoji">${data.icon || '📦'}</div>
          <div class="item-name">${name}</div>
          <div class="item-count">x${data.count || 1}</div>
        </div>
      `).join('');
    }
    const g1 = document.getElementById('item-grid');
    const g2 = document.getElementById('drawer-item-grid');
    if (g1) g1.innerHTML = html;
    if (g2) g2.innerHTML = html;
  }

  function updateFavors() {
    const knownChars = CHARAS.filter(c => (S.favors[c.id] || 0) > 10);
    let html;
    if (knownChars.length === 0) {
      html = '<div style="color:#666;font-size:12px;text-align:center;padding:10px;">尚未认识任何人</div>';
    } else {
      html = knownChars.map(c => {
        const fav = S.favors[c.id] || 0;
        const pct = Math.min(100, Math.max(0, fav));
        const stage = getStage(fav);
        const tooltipText = `${c.name} · ${c.title}\n━━━━━━━━━\n好感度：${fav}/100\n当前阶段：${stage.label}\n━━━━━━━━━\n${stage.tip}\n${S.haremFlags[c.id] ? '✅ 已解锁专属路线' : '⬜ 继续提升好感解锁'}`;
        return `
          <div class="favor-item" data-tooltip="${tooltipText}">
            <div class="favor-avatar" style="background:${c.color}22;border-color:${c.color}">${c.emoji}</div>
            <div class="favor-info">
              <div class="favor-name">${c.name} <span style="font-size:10px;color:${stage.color}">[${stage.label}]</span></div>
              <div class="favor-bar-bg">
                <div class="favor-bar" style="width:${pct}%;background:${c.color}"></div>
              </div>
            </div>
            <div class="favor-val">${fav}</div>
          </div>
        `;
      }).join('');
    }
    const l1 = document.getElementById('favor-list');
    const l2 = document.getElementById('drawer-favor-list');
    if (l1) l1.innerHTML = html;
    if (l2) l2.innerHTML = html;
    updateHaremBar();
  }



function updateHaremBar() {
  const count = Object.values(S.haremFlags).filter(Boolean).length;
  const dotsHtml = count === 0 ? '' : CHARAS.map(c => {
    const active = S.haremFlags[c.id] ? 'active' : '';
    return `<div class="harem-dot ${active}" title="${c.name}" style="background:${c.color}22;border-color:${S.haremFlags[c.id] ? c.color : 'var(--border)'}">${c.emoji}</div>`;
  }).join('');

  for (const suffix of ['', 'drawer-']) {
    const bar = document.getElementById(suffix + 'harem-bar');
    const dots = document.getElementById(suffix + 'harem-dots');
    if (!bar || !dots) continue;
    if (count === 0) { bar.style.display = 'none'; continue; }
    bar.style.display = 'block';
    bar.querySelector('.harem-bar-title').textContent = `💫 后宫进度 (${count}/4)`;
    dots.innerHTML = dotsHtml;
  }
}



function checkHaremStage() {
  const count = Object.values(S.haremFlags).filter(Boolean).length;
  if (count >= 2 && S.haremStage < 2) {
    S.haremStage = 2;
    setTimeout(() => notify('💕 后宫路线开启！多位角色的命运开始交织……'), 1000);
  } else if (count >= 1 && S.haremStage < 1) {
    S.haremStage = 1;
  }
}

function updateQuest() {
  if (!S.currentQuest) return;
  const q = S.currentQuest;
  const typeName = q.type === 'main' ? '主线任务' : '支线任务';
  const tooltipText = `${typeName}\n━━━━━━━━━\n${q.desc}\n━━━━━━━━━\n💰 奖励：${q.reward}`;
  const html = `
    <div class="quest-item ${q.type}" data-tooltip="${tooltipText}">
      <div class="quest-title">${q.title}</div>
      <div class="quest-desc">${q.desc}</div>
      <div class="quest-reward">奖励：${q.reward}</div>
    </div>
  `;
  const l1 = document.getElementById('quest-list');
  const l2 = document.getElementById('drawer-quest-list');
  if (l1) l1.innerHTML = html;
  if (l2) l2.innerHTML = html;
}

function updateUI() {
  // 更新 HP/MP/Gold
  document.getElementById('hp-val').textContent = S.hp;
  document.getElementById('hp-max').textContent = S.hpMax;
  document.getElementById('hp-bar').style.width = (S.hp / S.hpMax * 100) + '%';
  document.getElementById('mp-val').textContent = S.mp;
  document.getElementById('mp-max').textContent = S.mpMax;
  document.getElementById('mp-bar').style.width = (S.mp / S.mpMax * 100) + '%';
  document.getElementById('gold-val').textContent = S.gold;

  // 同步主角名到抽屉
  const drawerName = document.getElementById('drawer-player-name');
  if (drawerName) drawerName.textContent = S.playerName || '———';

  updateAttrs();
  updateSkills();
  updateItems();
  updateFavors();
  updateQuest();
  updateHaremBar();
}

// ============================================================
// 移动端抽屉控制
// ============================================================

function openDrawer() {
  const mask = document.getElementById('drawer-mask');
  const panel = document.getElementById('drawer-panel');
  if (!mask || !panel) return;
  mask.style.display = 'block';
  panel.style.display = 'flex';
  // 强制重排后再加 open 类触发动画
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      mask.classList.add('open');
      panel.classList.add('open');
    });
  });
  document.body.style.overflow = 'hidden';
}

function closeDrawer() {
  const mask = document.getElementById('drawer-mask');
  const panel = document.getElementById('drawer-panel');
  if (!mask || !panel) return;
  mask.classList.remove('open');
  panel.classList.remove('open');
  document.body.style.overflow = '';
  setTimeout(() => {
    mask.style.display = 'none';
    panel.style.display = 'none';
  }, 340);
}

// 滚动剧情框到最底部（双帧确保 DOM 渲染完毕后再滚）
function scrollToBottom() {
  const scroll = document.getElementById('story-scroll');
  if (!scroll) return;
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      // scrollTo 比直接赋 scrollTop 更可靠，instant 避免 iOS smooth 被拦截
      scroll.scrollTo({ top: scroll.scrollHeight, behavior: 'instant' });
      // 双保险：让最后一个子元素滚入视野
      const last = scroll.lastElementChild;
      if (last) last.scrollIntoView({ block: 'end', behavior: 'instant' });
    });
  });
}

// ============================================================
// 特效
// ============================================================

function notify(msg) {
  const el = document.getElementById('notif');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

function spawnFloatText(text, type) {
  const el = document.createElement('div');
  el.className = 'float-text ' + type;
  el.textContent = text;
  el.style.left = (35 + Math.random() * 30) + '%';
  el.style.top = (25 + Math.random() * 25) + '%';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1500);
}

// ============================================================
// 保存/读档
// ============================================================

function saveGame() {
  const saveData = { S, currentSceneId };
  localStorage.setItem('novella_save_v2', JSON.stringify(saveData));
  notify('💾 存档已保存');
}

function loadGame() {
  const data = localStorage.getItem('novella_save_v2');
  if (!data) { notify('没有找到存档'); return; }
  try {
    const { S: savedS, currentSceneId: savedId } = JSON.parse(data);
    S = savedS;
    currentSceneId = savedId || 'start';
    updateUI();
    document.getElementById('story-content').innerHTML = '';
    document.getElementById('start-screen').classList.add('hidden');
    showScene(currentSceneId);
    notify('📂 读档成功');
  } catch(e) {
    notify('读档失败');
  }
}

function resetGame() {
  if (!confirm('确定返回标题？当前进度将清空（可先保存）。')) return;
  saveGame();
  location.reload();
}

// ============================================================
// 核心游戏函数
// ============================================================

let currentSceneId = 'start';
let textIndex = 0;
let isShowingText = false;

function startGame() {
  S = defaultState(); // 初始化游戏状态
  const nameInput = document.getElementById('player-name-input');
  S.name = nameInput.value.trim() || '旅行者';
  document.getElementById('player-name-display').textContent = S.name;
  document.getElementById('start-screen').classList.add('hidden');
  updateUI();
  showScene('start');
}

function showScene(sceneId) {
  const scene = SCENES[sceneId];
  if (!scene) {
    console.error('Scene not found:', sceneId);
    return;
  }
  
  currentSceneId = sceneId;
  S.sceneHistory.push(sceneId);
  S.chapter = scene.chapter;
  textIndex = 0;
  
  // 更新UI
  document.getElementById('chapter-label').textContent = scene.chapterName + ' · ' + scene.label;
  document.getElementById('scene-label').textContent = scene.label;
  
  // 更新章节badge
  const badge = document.getElementById('chapter-badge');
  badge.textContent = scene.chapterName || '序章';
  
  // 更新女主角badge
  const heroineBadge = document.getElementById('heroine-badge');
  if (scene.heroine && scene.heroine !== 'system') {
    const char = CHARAS.find(c => c.id === scene.heroine);
    if (char) {
      heroineBadge.textContent = char.emoji + ' ' + char.name;
      heroineBadge.style.display = 'inline-block';
      heroineBadge.style.background = char.color;
    }
  } else {
    heroineBadge.style.display = 'none';
  }
  
  // 添加技能
  if (scene.skill) {
    if (!S.skills.find(s => s.name === scene.skill.name)) {
      S.skills.push(scene.skill);
      notify('✨ 获得技能：' + scene.skill.name);
    }
  }
  
  // 添加任务
  if (scene.quest) {
    S.currentQuest = scene.quest;
  }
  
  // 更新右侧面板
  updateSkills();
  updateQuest();
  
  // 添加好感度
  if (scene.favorAdd) {
    scene.favorAdd.forEach(id => {
      S.favors[id] = (S.favors[id] || 0) + 5;
    });
    updateFavors();
  }
  
  // 滚动到顶部
  const scroll = document.getElementById('story-scroll');
  scroll.scrollTop = 0;
  
  // 开始显示文本
  isShowingText = true;
  showNextText();
}

function showNextText() {
  const scene = SCENES[currentSceneId];
  if (!scene || !scene.text) return;
  
  if (textIndex >= scene.text.length) {
    // 显示选项
    showChoices(scene);
    isShowingText = false;
    return;
  }
  
  const item = scene.text[textIndex];
  const content = document.getElementById('story-content');
  
  if (item.type === 'scene') {
    content.innerHTML += '<div class="story-text scene-desc">' + item.content.replace(/\n/g, '<br>').replace(/\{\{playerName\}\}/g, S.name || '旅行者') + '</div>';
  } else if (item.type === 'system') {
    content.innerHTML += '<div class="story-text system-note">' + item.content.replace(/\n/g, '<br>').replace(/\{\{playerName\}\}/g, S.name || '旅行者') + '</div>';
  } else if (item.type === 'dialogue') {
    const char = CHARAS.find(c => c.id === item.char) || {name: item.speaker, emoji: '💬', color: '#888'};
    const speakerClass = item.char === 'player' ? 'player' : (item.char || 'npc');
    const displayName = item.char === 'player' ? S.name : item.speaker;
    content.innerHTML += `
      <div class="story-text dialogue">
        <div class="speaker ${speakerClass}" style="color:${char.color}">${char.emoji} ${displayName}</div>
        <div>${item.content.replace(/\n/g, '<br>').replace(/\{\{playerName\}\}/g, S.name || '旅行者')}</div>
      </div>
    `;
  } else if (item.type === 'next') {
    // 内联导航项：渲染一个继续按钮，点击后跳转到指定场景
    content.innerHTML += `<div class="inline-next-container"><button class="choice-btn inline-next-btn" onclick="playScene('${item.next}')">${item.text}</button></div>`;
    isShowingText = false;
    scrollToBottom();
    return; // 不增加 textIndex，也不自动继续，让玩家点击按钮
  }
  
  textIndex++;
  
  // 滚动到底部
  scrollToBottom();
  
  // 点击继续或自动继续
  if (textIndex < scene.text.length) {
    setTimeout(() => {
      if (isShowingText && textIndex <= scene.text.length) {
        showNextText();
      }
    }, 1500);
  } else {
    showChoices(scene);
  }
}

function showChoices(scene) {
  const content = document.getElementById('story-content');
  
  if (scene.ending) {
    content.innerHTML += `
      <div class="ending-screen">
        <div class="ending-title">—— ${scene.label} ——</div>
        <button class="choice-btn" onclick="resetGame()">🔄 重新开始</button>
      </div>
    `;
    scrollToBottom();
    return;
  }
  
  if (!scene.choices || scene.choices.length === 0) return;
  
  let html = '<div class="choices-container">';
  scene.choices.forEach((choice, i) => {
    const text = choice.text.replace(/\{\{playerName\}\}/g, S.name || '旅行者');
    html += `<button class="choice-btn" onclick="selectChoice(${i})">${text}</button>`;
  });
  html += '</div>';
  
  content.innerHTML += html;
  scrollToBottom();
}

function selectChoice(index) {
  const scene = SCENES[currentSceneId];
  const choice = scene.choices[index];
  
  // 处理好感度变化
  if (choice.favor) {
    const [charId, amount] = choice.favor;
    S.favors[charId] = (S.favors[charId] || 0) + amount;
    const char = CHARAS.find(c => c.id === charId);
    if (char) notify(`${char.emoji} ${char.name} 好感度 +${amount}`);
    updateFavors();
  }
  
  // 跳转到下一个场景
  if (choice.next) {
    const nextScene = SCENES[choice.next];
    if (nextScene) {
      showScene(choice.next);
    } else {
      console.error('Next scene not found:', choice.next);
    }
  }
}

// 点击粒子效果
document.addEventListener('click', e => {
  if (e.target.closest('.choice-btn')) {
    const rect = e.target.getBoundingClientRect();
    for (let i = 0; i < 4; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = (rect.left + Math.random() * rect.width) + 'px';
      p.style.top = (rect.top + Math.random() * rect.height) + 'px';
      p.style.background = ['#9060d0','#f0c060','#e090c0','#5090e0'][Math.floor(Math.random()*4)];
      p.style.boxShadow = `0 0 6px ${p.style.background}`;
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 2000);
    }
  }
});

// 初始化
document.addEventListener('DOMContentLoaded', updateUI);
</script>
